<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAI - Magma AI Suite</title>
  <style>
    :root {
      --bg-obsidian: #120c0a;
      --bg-dark-crust: #1c1411;
      --bg-vent: #2a1d18;
      --magma-glow: #ff4500;
      --magma-bright: #ff6a00;
      --magma-gold: #ffaa00;
      --text-light: #f5f0ed;
      --text-muted: #a6958e;
      --ash-border: #3d2b23;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-obsidian);
      color: var(--text-light);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--bg-dark-crust) 0%, #000 100%);
      border-bottom: 2px solid var(--magma-glow);
      box-shadow: 0 0 20px rgba(255, 69, 0, 0.2);
      padding: 15px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, var(--magma-gold) 0%, var(--magma-glow) 70%);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--magma-bright);
      animation: pulse 2s infinite alternate;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1.5px;
      background: linear-gradient(to right, var(--text-light), var(--magma-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Mode Selection Switch */
    .mode-selector {
      display: flex;
      background-color: var(--bg-obsidian);
      border: 1px solid var(--ash-border);
      padding: 4px;
      border-radius: 30px;
    }

    .mode-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--magma-glow), var(--magma-bright));
      color: white;
      box-shadow: 0 0 10px rgba(255, 106, 0, 0.4);
    }

    /* Layout Main Containers */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-dark-crust);
      height: 100%;
    }

    /* Preview Panel */
    .preview-panel {
      width: 50%;
      border-left: 2px solid var(--ash-border);
      background-color: #ffffff;
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .preview-header {
      background-color: var(--bg-vent);
      color: var(--text-light);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--ash-border);
    }

    .preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      background-color: #fff;
    }

    /* Messages Stream */
    .messages-container {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background-color: var(--bg-vent);
      border-right: 4px solid var(--magma-bright);
      color: var(--text-light);
    }

    .message.lai {
      align-self: flex-start;
      background-color: rgba(61, 43, 35, 0.4);
      border-left: 4px solid var(--magma-glow);
      color: var(--text-light);
    }

    .message pre {
      background-color: #000;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin-top: 8px;
      border: 1px solid var(--ash-border);
    }

    .message code {
      font-family: "Courier New", Courier, monospace;
      color: var(--magma-gold);
      font-size: 14px;
    }

    /* Input Area */
    .input-container {
      padding: 20px 24px;
      background-color: var(--bg-obsidian);
      border-top: 1px solid var(--ash-border);
    }

    .input-box-wrapper {
      display: flex;
      gap: 12px;
      background-color: var(--bg-vent);
      border: 1px solid var(--ash-border);
      border-radius: 8px;
      padding: 6px 12px;
      align-items: center;
      transition: border-color 0.3s ease;
    }

    .input-box-wrapper:focus-within {
      border-color: var(--magma-bright);
      box-shadow: 0 0 8px rgba(255, 106, 0, 0.2);
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 16px;
      padding: 10px 4px;
      outline: none;
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--magma-glow), var(--magma-bright));
      border: none;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    .send-btn:hover {
      opacity: 0.9;
    }

    .send-btn:active {
      transform: scale(0.97);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 8px var(--magma-glow); }
      100% { box-shadow: 0 0 18px var(--magma-bright); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon"></div>
      <div class="logo-text">LAI</div>
    </div>
    
    <div class="mode-selector">
      <button id="mode-chat" class="mode-btn active" onclick="setMode('chat')">Normal Chat</button>
      <button id="mode-app" class="mode-btn" onclick="setMode('app')">App Builder</button>
    </div>
  </header>

  <div class="workspace">
    <!-- AI Conversation Stream -->
    <div class="chat-panel">
      <div class="messages-container" id="messages-box">
        <div class="message lai">
          Welcome to <strong>LAI</strong>. I'm connected to your volcanic engine. How can I assist you today? Feel free to swap to <strong>App Builder</strong> mode if you want me to write and visually run a project live!
        </div>
      </div>
      
      <div class="input-container">
        <div class="input-box-wrapper">
          <input type="text" id="user-input" class="chat-input" placeholder="Ask LAI anything..." onkeydown="if(event.key === 'Enter') sendMessage()" />
          <button class="send-btn" onclick="sendMessage()">Erupt</button>
        </div>
      </div>
    </div>

    <!-- Live App Sandbox Output -->
    <div class="preview-panel" id="preview-section">
      <div class="preview-header">
        <span>Live Workspace Preview</span>
        <span style="color: var(--magma-gold); font-size: 12px; font-weight: bold;">● Active Sandbox</span>
      </div>
      <iframe class="preview-frame" id="sandbox-iframe"></iframe>
    </div>
  </div>

  <script>
    // Hardcoded Gemini Key from user payload
<script>
    // Hardcoded Gemini Key from your configuration
    const API_KEY = "AQ.Ab8RN6ISVRzFI53KlD-9aL9RM5bVQZfczBXyeWGnZxhGdLsvAg";
    let currentMode = "chat";

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-chat').classList.toggle('active', mode === 'chat');
      document.getElementById('mode-app').classList.toggle('active', mode === 'app');
      
      const previewPanel = document.getElementById('preview-section');
      const inputField = document.getElementById('user-input');
      
      if (mode === 'app') {
        previewPanel.style.display = 'flex';
        inputField.placeholder = "Describe the app you want me to design and render...";
      } else {
        previewPanel.style.display = 'none';
        inputField.placeholder = "Ask LAI anything...";
      }
    }

    async function sendMessage() {
      const inputEl = document.getElementById('user-input');
      const text = inputEl.value.trim();
      if (!text) return;

      // Render user message
      appendMessage(text, 'user');
      inputEl.value = '';

      // Create LAI loading message placeholder
      const aiMessageId = appendMessage("Channelling core energy...", 'lai');

      try {
        let systemInstruction = "You are LAI, an intelligent assistant styled with a magma/lava theme. Provide accurate, powerful answers.";
        if (currentMode === 'app') {
          systemInstruction += " The user wants you to write a single-file application (HTML, CSS, JavaScript combined). You MUST return valid code inside standard markdown ```html ``` blocks. Make it completely functional, interactive, well-designed, and standalone so it can run immediately in an iframe.";
        }

        // Utilizing Google's high-compatibility web pipeline to route seamlessly inside the browser sandbox
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/openai/chat/completions`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "gemini-2.5-flash",
            messages: [
              { role: "system", content: systemInstruction },
              { role: "user", content: text }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP status error: ${response.status}`);
        }

        const data = await response.json();
        const replyText = data.choices[0].message.content;

        // Update placeholder message with AI content
        updateMessage(aiMessageId, replyText);

        // If in App Builder mode, find HTML block and render inside iframe
        if (currentMode === 'app') {
          const codeBlockRegex = /```html([\s\S]*?)```/i;
          const match = replyText.match(codeBlockRegex);
          if (match && match[1]) {
            const extractedCode = match[1].trim();
            const iframe = document.getElementById('sandbox-iframe');
            iframe.srcdoc = extractedCode;
          }
        }

      } catch (err) {
        console.error(err);
        updateMessage(aiMessageId, "Failed to connect to the magma core. Please confirm your API Key quota status or try reloading the file.");
      }
    }

    function appendMessage(text, sender) {
      const box = document.getElementById('messages-box');
      const msg = document.createElement('div');
      const id = 'msg-' + Date.now();
      msg.id = id;
      msg.className = `message ${sender}`;
      
      if (sender === 'user') {
        msg.textContent = text;
      } else {
        msg.innerHTML = formatMarkdown(text);
      }
      
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
      return id;
    }

    function updateMessage(id, text) {
      const msg = document.getElementById(id);
      if (msg) {
        msg.innerHTML = formatMarkdown(text);
        const box = document.getElementById('messages-box');
        box.scrollTop = box.scrollHeight;
      }
    }

    // Elementary markdown formatter for code blocks and bolding
    function formatMarkdown(text) {
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\*\*([\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/```html([\s\S]*?)```/gi, '<pre><code>$1</code></pre>')
        .replace(/```javascript([\s\S]*?)```/gi, '<pre><code>$1</code></pre>')
        .replace(/```css([\s\S]*?)```/gi, '<pre><code>$1</code></pre>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      return html;
    }
  </script>
</body>
</html>
